<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestedle</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="/_vercel/insights/script.js"></script>
    <script type="importmap">
      {
        "imports": {
          "@vercel/analytics": "https://cdn.jsdelivr.net/npm/@vercel/analytics@1/+esm"
        }
      }
    </script>
</head>
<body>
    <div id="game-container">
        <h1>Celestedle</h1>
        
        <div id="game-status">
            <p>Tentatives : <span id="try-count">0</span></p>
            <button id="share-btn" style="display: none; background-color: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer;">Share</button>
            <button id="giveup-btn">Forfeit</button>
            <button id="rules-btn">Rules</button>
        </div>

        <form id="guess-form">
            <div class="input-container" style="position: relative; display: inline-block; width: 100%;">
                <input type="text" id="element-input" autocomplete="off" placeholder="Guess an element...">
                <div id="element-suggestions" class="suggestions-box"></div>
            </div>
            <button type="submit">Guess</button>
        </form>

        <table id="guesses-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Chapter</th>
                    <th>Colour</th>
                    <th>Hitbox</th>
                </tr>
            </thead>
            <tbody id="guesses-body">
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module" src="script-client.js"></script>  
</body>
</html>
