<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestedle</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div id="game-container">
        <h1>Celestedle</h1>
        
        <div id="game-status">
            <p>Tries: <span id="try-count">0</span></p>
            <button id="share-btn">Share</button>
            <button id="giveup-btn">Forfeit</button>
            <button id="rules-btn">Rules</button>
            <a href="https://discord.gg/3yqgMbuMbX" target="_blank" id="discord-btn" class="status-link-btn">Discord</a>
        </div>

        <div id="message-container"></div>

        <form id="guess-form">
            <div class="input-container">
                <input type="text" id="element-input" autocomplete="off" placeholder="Guess an element...">
                <div id="element-suggestions" class="suggestions-box"></div>
            </div>
            <button type="submit">Guess</button>
        </form>

        <table id="guesses-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Chapter</th>
                    <th>Colour</th>
                    <th>Hitbox</th>
                </tr>
            </thead>
            <tbody id="guesses-body">
            </tbody>
        </table>
    </div>

    <div id="forfeit-modal" class="rules-modal" style="display: none;">
        <div class="rules-content" style="max-width: 450px; text-align: center;">
            <h2 style="color: var(--color-wrong);">Give up?</h2>
            <p style="margin-bottom: 24px;">Are you sure you want to forfeit today's Celestedle and reveal the secret answer?</p>
            <div style="display: flex; gap: 16px; justify-content: center;">
                <button id="confirm-forfeit-btn" style="background-color: var(--color-wrong); color: white; padding: 12px 24px; border-radius: 8px; border: none; font-family: 'Renogare', sans-serif; cursor: pointer;">Yes, Forfeit</button>
                <button id="cancel-forfeit-btn" style="background-color: var(--bg-input); color: white; padding: 12px 24px; border-radius: 8px; border: 1px solid #334155; font-family: 'Renogare', sans-serif; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script-client.js" defer></script>  
</body>
</html>
